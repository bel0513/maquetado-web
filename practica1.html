<!DOCTYPE html>

<!--Le dice al navegador que el documento usa HTML5.
No es una etiqueta HTML como tal, es una declaración. Sirve para que el navegador interprete correctamente el código.  -->


<html lang="es">

<!-- Es la etiqueta raíz (todo el documento va dentro).
lang="es" indica que el idioma es español (útil para accesibilidad y SEO). -->

<head>

    <!-- Aquí va la configuración de la página (no se ve directamente en pantalla). -->
    <meta charset="UTF-8">
    
    <!-- Define la codificación de caracteres.
Permite usar tildes, ñ, símbolos, etc sin errores. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Hace que la página sea responsive 📱
Se adapta a celulares y tablets correctamente. -->
    <title>Document</title>
    <!-- Es el título de la pestaña del navegador. -->
</head>
<body>
    👻
    <!-- Aquí va todo lo visible de la página:
texto, imágenes, botones, etc. -->
    
</body>
</html><S></S>
